# Default values for tinyauth.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1 # @schema default: 1
deploymentStrategy:
  type: RollingUpdate # @schema default: "RollingUpdate"

image:
  repository: ghcr.io/tinyauthapp/tinyauth # @schema default: "ghcr.io/tinyauthapp/tinyauth"
  pullPolicy: IfNotPresent # @schema default: "IfNotPresent"
  # Overrides the image tag whose default is the chart appVersion.
  tag: "" # @schema default: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP # @schema default: "ClusterIP"
  port: 80 # @schema default: 80

# Tinyauth Configuration
tinyauth:
  # The base URL where the app is hosted.
  appUrl: "" # @schema default: ""; required: true

  # Path to config file.
  configFile: "" # @schema default: ""

  # Label provider to use for ACLs (auto, docker, kubernetes or none to disable). auto detects the environment.
  labelProvider: "auto" # @schema default: "auto"

  # Resources config
  resources:
    path: "/data/resources" # @schema default: "/data/resources"
    enabled: true # @schema default: true

  # Database config
  database:
    # The database driver to use. Valid values: sqlite, postgres, memory.
    driver: "sqlite" # @schema default: "sqlite"
    # The path to the SQLite database file, or connection URL when driver is postgres.
    path: "/data/tinyauth.db" # @schema default: "/data/tinyauth.db"

  # Analytics config
  analytics:
    # Disable analytics.
    enabled: true # @schema default: true

  # server config
  server:
    # The port on which the server listens.
    port: 3000 # @schema default: 3000
    # The address on which the server listens.
    address: "0.0.0.0" # @schema default: "0.0.0.0"
    # The path to the Unix socket.
    socketPath: "" # @schema default: ""

  # auth config
  auth:
    # IP allowlisting and blacklisting settings
    ip:
      # List of allowed IPs or CIDR ranges.
      allow: "" # @schema default: ""
      # List of blocked IPs or CIDR ranges.
      block: "" # @schema default: ""
      # List of IPs or CIDR ranges that bypass authentication entirely.
      bypass: "" # @schema default: ""
    # Comma-separated list of users (username:hashed_password).
    users: "" # @schema default: ""
    # Enable subdomains support.
    subdomainsEnabled: true # @schema default: true
    # Path to the users file.
    usersFile: "" # @schema default: ""
    # Enable secure cookies.
    secureCookie: false # @schema default: false
    # Session expiry time in seconds.
    sessionExpiry: 86400 # @schema default: 86400
    # Maximum session lifetime in seconds.
    sessionMaxLifetime: 0 # @schema default: 0
    # Login timeout in seconds.
    loginTimeout: 300 # @schema default: 300
    # Maximum login retries.
    loginMaxRetries: 3 # @schema default: 3
    # Comma-separated list of trusted proxy addresses.
    trustedProxies: "" # @schema default: ""
    # ACL config
    acls:
      # ACL policy for allow-by-default or deny-by-default. Available options: allow, deny.
      policy: "allow" # @schema default: "allow"
    # Per-user attributes (OIDC claims), keyed by username.
    userAttributes: # @schema type:array; default:[]
      - username: "" # @schema type:string; default:""
        # Full name of the user.
        name: "" # @schema type:string; default:""
        # Given (first) name of the user.
        givenName: "" # @schema type:string; default:""
        # Family (last) name of the user.
        familyName: "" # @schema type:string; default:""
        # Middle name of the user.
        middleName: "" # @schema type:string; default:""
        # Nickname of the user.
        nickname: "" # @schema type:string; default:""
        # URL of the user's profile page.
        profile: "" # @schema type:string; default:""
        # URL of the user's profile picture.
        picture: "" # @schema type:string; default:""
        # URL of the user's website.
        website: "" # @schema type:string; default:""
        # Email address of the user.
        email: "" # @schema type:string; default:""
        # Gender of the user.
        gender: "" # @schema type:string; default:""
        # Birthdate of the user (YYYY-MM-DD).
        birthdate: "" # @schema type:string; default:""
        # Time zone of the user (e.g. Europe/Athens).
        zoneInfo: "" # @schema type:string; default:""
        # Locale of the user (e.g. en-US).
        locale: "" # @schema type:string; default:""
        # Phone number of the user.
        phoneNumber: "" # @schema type:string; default:""
        # Address of the user.
        address: # @schema type:object
          # Full mailing address, formatted for display.
          formatted: "" # @schema type:string; default:""
          # Street address.
          streetAddress: "" # @schema type:string; default:""
          # City or locality.
          locality: "" # @schema type:string; default:""
          # State, province, or region.
          region: "" # @schema type:string; default:""
          # Zip or postal code.
          postalCode: "" # @schema type:string; default:""
          # Country.
          country: "" # @schema type:string; default:""

  # apps config
  # Per-app configuration, keyed by app id (name).
  apps: # @schema type:array; default:[]
    - id: "" # @schema type:string; default:""
      config:
        # The domain of the app.
        domain: "" # @schema type:string; default:""
      users:
        # Comma-separated list of allowed users.
        allow: "" # @schema type:string; default:""
        # Comma-separated list of blocked users.
        block: "" # @schema type:string; default:""
      oauth:
        # Comma-separated list of allowed OAuth groups.
        whitelist: "" # @schema type:string; default:""
        # Comma-separated list of required OAuth groups.
        groups: "" # @schema type:string; default:""
      ip:
        # List of allowed IPs or CIDR ranges.
        allow: "" # @schema type:string; default:""
        # List of blocked IPs or CIDR ranges.
        block: "" # @schema type:string; default:""
        # List of IPs or CIDR ranges that bypass authentication.
        bypass: "" # @schema type:string; default:""
      response:
        # Custom headers to add to the response.
        headers: "" # @schema type:string; default:""
        basicAuth:
          # Basic auth username.
          username: "" # @schema type:string; default:""
          # Basic auth password.
          password: "" # @schema type:string; default:""
          # Path to the file containing the basic auth password.
          passwordFile: "" # @schema type:string; default:""
          # Reference to an existing secret containing the basic auth password.
          passwordSecretRef: # @schema type:object
            name: "" # @schema type:string; default:""
            key: "" # @schema type:string; default:""
      path:
        # Comma-separated list of allowed paths.
        allow: "" # @schema type:string; default:""
        # Comma-separated list of blocked paths.
        block: "" # @schema type:string; default:""
      ldap:
        # Comma-separated list of required LDAP groups.
        groups: "" # @schema type:string; default:""

  # oauth config
  oauth:
    # Comma-separated list of allowed OAuth domains.
    whitelist: "" # @schema default: ""
    # Path to the OAuth whitelist file.
    whitelistFile: "" # @schema default: ""
    # The OAuth provider to use for automatic redirection.
    autoRedirect: "" # @schema default: ""
    # OAuth providers list.
    providers: # @schema type:array; default:[]
      - id: "" # @schema type:string; default:""
        clientId: "" # @schema type:string; default:""
        clientSecret: "" # @schema type:string; default:""
        clientSecretFile: "" # @schema type:string; default:""
        clientSecretSecretRef: # @schema type:object
          name: "" # @schema type:string; default:""
          key: "" # @schema type:string; default:""
        # Comma-separated list of allowed OAuth domains for this provider.
        whitelist: "" # @schema type:string; default:""
        # Path to the OAuth whitelist file for this provider.
        whitelistFile: "" # @schema type:string; default:""
        scopes: "" # @schema type:string; default:""
        redirectUrl: "" # @schema type:string; default:""
        authUrl: "" # @schema type:string; default:""
        tokenUrl: "" # @schema type:string; default:""
        userInfoUrl: "" # @schema type:string; default:""
        insecure: false # @schema type:boolean; default:false
        name: "" # @schema type:string; default:""

  # oidc config
  oidc:
    # Path to the private key file.
    privateKeyPath: "" # @schema default: ""
    # Path to the public key file.
    publicKeyPath: "" # @schema default: ""
    # OIDC clients list.
    clients: # @schema type:array; default:[]
      - id: "" # @schema type:string; default:""
        clientId: "" # @schema type:string; default:""
        clientSecret: "" # @schema type:string; default:""
        clientSecretFile: "" # @schema type:string; default:""
        clientSecretSecretRef: # @schema type:object
          name: "" # @schema type:string; default:""
          key: "" # @schema type:string; default:""
        trustedRedirectUris: "" # @schema type:string; default:""
        name: "" # @schema type:string; default:""

  # ui config
  ui:
    # The title of the UI.
    title: "Tinyauth" # @schema default: "Tinyauth"
    # Message displayed on the forgot password page.
    forgotPasswordMessage: "You can change your password by changing the configuration." # @schema default: "You can change your password by changing the configuration."
    # Path to the background image.
    backgroundImage: "/background.jpg" # @schema default: "/background.jpg"
    # Disable UI warnings.
    warningsEnabled: true # @schema default: true

  # ldap config
  ldap:
    # LDAP server address.
    address: "" # @schema default: ""
    # Bind DN for LDAP authentication.
    bindDn: "" # @schema default: ""
    # Bind password for LDAP authentication.
    bindPassword: "" # @schema default: ""
    # Path to the file containing the bind password.
    bindPasswordFile: "" # @schema default: ""
    bindPasswordSecretRef:
      name: "" # @schema default: ""
      key: "" # @schema default: ""
    # Base DN for LDAP searches.
    baseDn: "" # @schema default: ""
    # Allow insecure LDAP connections.
    insecure: false # @schema default: false
    # LDAP search filter.
    searchFilter: "(uid=%s)" # @schema default: "(uid=%s)"
    # Certificate for mTLS authentication.
    authCert: "" # @schema default: ""
    # Certificate key for mTLS authentication.
    authKey: "" # @schema default: ""
    # Cache duration for LDAP group membership in seconds.
    groupCacheTtl: 900 # @schema default: 900

  # tailscale config
  tailscale:
    # Enable Tailscale integration.
    enabled: false # @schema default: false
    # Tailscale API token.
    apiToken: "" # @schema default: ""
    # Path to the file containing the Tailscale API token.
    apiTokenFile: "" # @schema default: ""
    # Reference to an existing secret containing the Tailscale API token.
    apiTokenSecretRef:
      name: "" # @schema default: ""
      key: "" # @schema default: ""
    # Tailnet name.
    tailnet: "" # @schema default: ""
    # Cache duration for Tailscale device and user lists in seconds.
    cacheDuration: 300 # @schema default: 300

  # experimental config
  experimental:
    # Enable the OAuth bridge, uses a new way to format OAuth user information.
    oauthBridgeEnabled: false # @schema default: false

  # log config
  log:
    # Log level (trace, debug, info, warn, error).
    level: "info" # @schema default: "info"
    # Enable JSON formatted logs.
    json: false # @schema default: false
    streams:
      http:
        # Enable this log stream.
        enabled: true # @schema default: true
        # Log level for this stream. Use global if empty.
        level: "" # @schema default: ""
      app:
        # Enable this log stream.
        enabled: true # @schema default: true
        # Log level for this stream. Use global if empty.
        level: "" # @schema default: ""
      audit:
        # Enable this log stream.
        enabled: false # @schema default: false
        # Log level for this stream. Use global if empty.
        level: "" # @schema default: ""

ingress:
  enabled: false # @schema default: false
  className: "" # @schema default: ""
  annotations: {} # @schema default: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts: # @schema default: [{"host": "chart-example.local", "paths": [{"path": "/", "pathType": "ImplementationSpecific"}]}]
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: [] # @schema default: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe: # @schema default: {"httpGet": {"path": "/api/healthz", "port": "http"}}
  httpGet:
    path: /api/healthz
    port: http
readinessProbe: # @schema default: {"httpGet": {"path": "/api/healthz", "port": "http"}}
  httpGet:
    path: /api/healthz
    port: http

autoscaling:
  enabled: false # @schema default: false
  minReplicas: 1 # @schema default: 1
  maxReplicas: 10 # @schema default: 10
  targetCPUUtilizationPercentage: 80 # @schema default: 80
  targetMemoryUtilizationPercentage: 80 # @schema default: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

httpRoute:
  enabled: false # @schema default: false
  annotations: {} # @schema default: {}
  parentRefs: # @schema default: [{"name": "my-gateway"}]
    - name: my-gateway
  hostnames: # @schema default: ["chart-example.local"]
    - chart-example.local
  rules: # @schema default: [{"matches": [{"path": {"type": "PathPrefix", "value": "/"}}]}]
    - matches:
        - path:
            type: PathPrefix
            value: /

# Extra Kubernetes objects to deploy alongside the chart.
# Useful for deploying additional manifests (e.g. SealedSecrets containing OIDC
# client credentials) without needing a separate Helm release. Each item is a
# raw Kubernetes manifest and may use template expressions.
extraObjects: [] # @schema default: []
# - apiVersion: v1
#   kind: Secret
#   metadata:
#     name: my-extra-secret
#   stringData:
#     key: value

# Additional environment variables for the container
env: [] # @schema default: []
# - name: CUSTOM_VAR
#   value: "custom_value"
# - name: SECRET_VAR
#   valueFrom:
#     secretKeyRef:
#       name: my-secret
#       key: secret-key

# Enable persistent storage for SQLite database and OIDC keys
# When enabled a PersistentVolumeClaim will be created to persist the SQLite database
# this ensures session data is not lost
persistence:
  enabled: false # @schema default: false; description: Enable persistent storage for SQLite session database
  # existingClaim: "" # @schema default: ""; description: Use an existing PersistentVolumeClaim instead of creating a new one
  storageClass: "" # @schema default: ""; description: StorageClass for the PVC. If not set, the default StorageClass will be used
  accessMode: ReadWriteOnce # @schema default: "ReadWriteOnce"; description: Access mode for the PVC
  size: 1Gi # @schema default: "1Gi"; description: Size of the PVC for SQLite database storage
  mountPath: /data # @schema default: "/data"; description: Mount path for the persistent volume where SQLite database will be stored
  annotations: {} # @schema default: {}; description: Annotations to add to the PVC
